kind = "web"
previewPath = "/"
title = "SensePath – Portfolio"
version = "1.0.0"
id = "artifacts/sensepath"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20274

[services.development]
run = "pnpm --filter @workspace/sensepath run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sensepath", "run", "build" ]
publicDir = "artifacts/sensepath/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20274"
BASE_PATH = "/"
